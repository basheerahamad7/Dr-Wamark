<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>
    
    <!-- Shield/Droplet Gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fda4af" />
      <stop offset="50%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#be123c" />
    </linearGradient>

    <!-- Cross Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Smooth rounded base container -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Shield Shape (Clean & Protective) -->
  <path d="M 256 90 C 340 90, 400 120, 400 120 C 400 240, 360 360, 256 422 C 152 360, 112 240, 112 120 C 112 120, 172 90, 256 90 Z" fill="url(#shieldGrad)" />

  <!-- Inner Dark Core (Shield Depth) -->
  <path d="M 256 112 C 324 112, 375 137, 375 137 C 375 233, 341 331, 256 392 C 171 331, 137 233, 137 137 C 137 137, 188 112, 256 112 Z" fill="#0f172a" />

  <!-- stylized Sanitizing Cross / Spark / Droplet inside shield -->
  <g>
    <!-- Vertical bar of medical cross -->
    <rect x="236" y="170" width="40" height="150" rx="20" fill="url(#shieldGrad)" />
    <!-- Horizontal bar of medical cross -->
    <rect x="181" y="225" width="150" height="40" rx="20" fill="url(#shieldGrad)" />
    
    <!-- Central Bright Core Spark (The sanitizing power) -->
    <circle cx="256" cy="245" r="14" fill="#ffffff" filter="url(#glow)" />
    
    <!-- Shimmering Star sparkle at top right to signify "crystal clean" -->
    <path d="M 315 165 C 315 177, 327 177, 327 177 C 327 177, 315 177, 315 189 C 315 177, 303 177, 303 177 C 303 177, 315 177, 315 165 Z" fill="#ffffff" />
    
    <!-- Minimalist sanitizing text wash line -->
    <path d="M 185 315 Q 256 300 327 315" stroke="url(#shieldGrad)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.5" />
    <path d="M 205 333 Q 256 320 307 333" stroke="url(#shieldGrad)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.3" />
  </g>
</svg>
